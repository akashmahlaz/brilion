# =============================================================================
# Brilion — AWS Auto-Deploy Pipeline
# =============================================================================
# Flow: push to main → build Docker → push to ECR → App Runner auto-deploys
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN          — IAM role ARN for OIDC auth (no static keys needed)
#   APP_RUNNER_SERVICE_ARN — App Runner service ARN (optional, speeds up deploy)
#
# AWS Setup (one-time):
#   1. Create ECR repository: aws ecr create-repository --repository-name brilion
#   2. Create App Runner service (image-based, from ECR, auto-deploy ON)
#   3. Create IAM role for GitHub OIDC (see docs/aws-iam-setup.md)
# =============================================================================

name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger

env:
  AWS_REGION: us-east-1        # change to your preferred region
  ECR_REPOSITORY: brilion      # must match ECR repo name you created

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── AWS Auth via OIDC (no long-lived access keys) ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Push Docker image to ECR ──
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      # ── Trigger App Runner deployment (skips polling delay) ──
      # App Runner also auto-deploys when it detects a new ECR image,
      # but explicitly starting here makes the deploy start immediately.
      - name: Deploy to App Runner
        if: ${{ secrets.APP_RUNNER_SERVICE_ARN != '' }}
        run: |
          aws apprunner start-deployment \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN }}
          echo "✅ App Runner deployment triggered"

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ steps.build-image.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** \`${{ env.AWS_REGION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
